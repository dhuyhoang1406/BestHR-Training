services:
  postgres:
    image: postgres:16-alpine
    container_name: besthr-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: besthr
      POSTGRES_PASSWORD: besthr
      POSTGRES_DB: besthr_training
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U besthr -d besthr_training']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
